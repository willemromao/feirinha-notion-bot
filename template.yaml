AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Bot Telegram para cadastro automático de compras no Notion

Globals:
  Function:
    Timeout: 60
    MemorySize: 512
    Runtime: python3.12
    Architectures:
      - x86_64

Resources:
  # Tabela DynamoDB para rastrear updates processados
  UpdatesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub '${AWS::StackName}-updates'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: update_id
          AttributeType: S
      KeySchema:
        - AttributeName: update_id
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  TelegramBotFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: lambda_handler.lambda_handler
      Environment:
        Variables:
          TELEGRAM_BOT_TOKEN: !Ref TelegramBotToken
          TELEGRAM_SECRET_TOKEN: !Ref TelegramSecretToken
          AUTHORIZED_USER_ID: !Ref AuthorizedUserId
          AUTHORIZED_USER_IDS: !Ref AuthorizedUserIds
          OPENAI_API_KEY: !Ref OpenAIApiKey
          NOTION_TOKEN: !Ref NotionToken
          NOTION_DATABASE_ID: !Ref NotionDatabaseId
          NOTION_DATABASE_BY_USER: !Ref NotionDatabaseByUser
          DYNAMODB_TABLE_NAME: !Ref UpdatesTable
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref UpdatesTable
      Events:
        TelegramWebhook:
          Type: HttpApi
          Properties:
            Path: /webhook
            Method: post

Parameters:
  TelegramBotToken:
    Type: String
    NoEcho: true
    Description: Token do bot obtido do BotFather

  TelegramSecretToken:
    Type: String
    NoEcho: true
    Description: Token secreto para validação do webhook

  AuthorizedUserId:
    Type: String
    Description: Telegram User ID autorizado a usar o bot

  AuthorizedUserIds:
    Type: String
    Default: ''
    Description: Lista adicional de Telegram User IDs autorizados, separados por vírgula

  OpenAIApiKey:
    Type: String
    NoEcho: true
    Description: Chave da API OpenAI

  NotionToken:
    Type: String
    NoEcho: true
    Description: Token de integração do Notion

  NotionDatabaseId:
    Type: String
    Description: ID da base de dados Notion

  NotionDatabaseByUser:
    Type: String
    Default: ''
    Description: JSON opcional para rotear usuário para base Notion (ex. {"123":"dbA","456":"dbB"})

Outputs:
  WebhookUrl:
    Description: URL para configurar o webhook do Telegram
    Value: !Sub 'https://${ServerlessHttpApi}.execute-api.${AWS::Region}.amazonaws.com/webhook'

  FunctionArn:
    Description: ARN da função Lambda
    Value: !GetAtt TelegramBotFunction.Arn

  UpdatesTableName:
    Description: Nome da tabela DynamoDB para updates
    Value: !Ref UpdatesTable
