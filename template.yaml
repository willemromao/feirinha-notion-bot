AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Bot Telegram para cadastro automático de compras no Notion

Globals:
  Function:
    Timeout: 180
    MemorySize: 512
    Runtime: python3.12
    Architectures:
      - x86_64

Resources:
  # Tabela DynamoDB para rastrear updates processados
  UpdatesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub '${AWS::StackName}-updates'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: update_id
          AttributeType: S
      KeySchema:
        - AttributeName: update_id
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  TelegramBotFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: lambda_handler.lambda_handler
      Environment:
        Variables:
          TELEGRAM_BOT_TOKEN: !Ref TelegramBotToken
          TELEGRAM_SECRET_TOKEN: !Ref TelegramSecretToken
          AUTHORIZED_USER_IDS: !Ref AuthorizedUserIds
          OPENAI_API_KEY: !Ref OpenAIApiKey
          NOTION_CONFIG_BY_USER: !Ref NotionConfigByUser
          DYNAMODB_TABLE_NAME: !Ref UpdatesTable
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref UpdatesTable
      Events:
        TelegramWebhook:
          Type: HttpApi
          Properties:
            Path: /webhook
            Method: post

Parameters:
  TelegramBotToken:
    Type: String
    NoEcho: true
    Description: Token do bot obtido do BotFather

  TelegramSecretToken:
    Type: String
    NoEcho: true
    Description: Token secreto para validação do webhook

  AuthorizedUserIds:
    Type: String
    Description: Lista de Telegram User IDs autorizados, separados por vírgula

  OpenAIApiKey:
    Type: String
    NoEcho: true
    Description: Chave da API OpenAI

  NotionConfigByUser:
    Type: String
    NoEcho: true
    Description: JSON com token e database_id por usuário (ex. {"123":{"database_id":"dbA","token":"tokenA"}})

Outputs:
  WebhookUrl:
    Description: URL para configurar o webhook do Telegram
    Value: !Sub 'https://${ServerlessHttpApi}.execute-api.${AWS::Region}.amazonaws.com/webhook'

  FunctionArn:
    Description: ARN da função Lambda
    Value: !GetAtt TelegramBotFunction.Arn

  UpdatesTableName:
    Description: Nome da tabela DynamoDB para updates
    Value: !Ref UpdatesTable
